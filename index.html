## 0. 课程总览 — ADS Pipeline

\`\`\`
Sensors (Camera/LiDAR/Radar/GNSS/IMU) + HD Map
        ↓
  Perception ──→ Localization ──→ Prediction
        ↓              ↓              ↓
        └──────────────┴──────────────┘
                       ↓
                  Planning
                 (Route → Behavior → Motion)
                       ↓
                   Control
                 (Lateral + Longitudinal)
                       ↓
                  Actuation
              (Steering / Throttle / Brake)
\`\`\`

**五大核心模块**：

| 模块 | 输入 | 输出 | 典型方法 |
|------|------|------|----------|
| **Perception** | Raw sensor data (LiDAR/Camera/Radar) | 3D bounding boxes, segmentation, lane lines, drivable space | PointPillars, BEVFormer, YOLO |
| **Localization** | GNSS/IMU/LiDAR/Camera/HD Map | 6-DOF pose (position + orientation) | Kalman Filter, SLAM, ICP, NDT |
| **Prediction** | Tracked objects + HD Map + ego state | Multi-modal future trajectories (5-8s horizon) | GNN, Transformer, Diffusion |
| **Planning** | Route + perception + prediction + HD Map | Safe, comfortable trajectory (path + speed) | Dijkstra, A*, optimization |
| **Control** | Reference trajectory from planner | Steering / Throttle / Brake commands | PID, LQR, MPC |

### 1.2 SAE 自动驾驶等级

| 等级 | 名称 | 横向/纵向控制 | OEDR | 设计运行域 | 责任 |
|------|------|-------------|------|-----------|------|
| **L0** | No Automation | 人类 | 人类 | — | 人类全责 |
| **L1** | Driver Assistance | 人类+系统（单一） | 人类 | 特定 | 人类 |
| **L2** | Partial Automation | 系统（横向+纵向） | 人类 | 特定 | 人类（必须始终监控） |
| **L3** | Conditional Automation | 系统 | 系统 | 特定 | 系统工作时系统负责，接管后人类负责 |
| **L4** | High Automation | 系统 | 系统 | 特定 | 系统（在 ODD 内全责） |
| **L5** | Full Automation | 系统 | 系统 | 无限制 | 系统全责 |

> **OEDR** = Object and Event Detection and Response（目标和事件检测与响应）
> **关键区分**：L2 人类必须始终监控；L3 系统负责但需要人类做 fallback；L4 在 ODD 内不需要人类。

### 1.5 为什么 ADS 采用模块化架构

- 各模块可独立开发、测试、验证、升级
- 模块间接口清晰，便于团队协作
- 每个模块的失败模式可独立分析和处理

- 相比端到端单一优化：可调试性好，但存在误差跨模块传播

## 2. Localization 定位

### 2.1 GNSS-based vs Perception-based Localization <span class="tag">高频考点</span>

| 维度 | GNSS-based | Perception-based |
|------|-----------|-----------------|
| **坐标类型** | 全局绝对坐标 | 相对环境或地图相对绝对坐标 |
| **精度** | 标准 3-10m，RTK 1-2cm | 相对 cm 级，地图绝对 m 级 |
| **更新频率** | 1-10 Hz | 10-100+ Hz |
| **漂移** | 无（绝对参考） | 里程计有显著漂移，地图匹配无漂移 |
| **初始化** | 即时（信号获取后） | 需要初始位姿或建图 |
| **环境依赖** | 需要开阔天空视野 | 需要可感知环境特征 |
| **计算负荷** | 低（信号处理） | 高（传感器数据处理、特征提取、匹配） |
| **安全性威胁** | 易受 spoofing/jamming | 易受环境操控、传感器攻击 |
| **输出** | 位置为主，姿态有限 | 完整 6-DOF pose |
| **典型传感器** | GNSS 接收器，RTK | Camera, LiDAR, Radar, IMU |
| **最佳场景** | 大范围导航、户外定位 | 局部精确导航、GNSS-denied 区域 |

**对实时控制的影响**（short-answer 常考）：
- 定位误差 → lateral/heading tracking error → 规划偏移 → 控制不稳定
- GNSS 信号丢失时需 IMU 短期填补，但 IMU 漂移会累积
- Perception-based 高频率对实时控制更友好，但计算延迟需考虑

### 2.2 GNSS 定位原理

- **基本原理**：通过测量卫星信号传播时间计算距离（三边定位 trilateration）
- 卫星配备原子钟，接收器通过信号延迟计算距离
- **需要至少 4 颗卫星**：3 颗确定位置（3 个球面交点），第 4 颗修正时钟误差
- **四大 GNSS 系统**：GPS（美国）、Galileo（欧洲）、BeiDou（中国）、GLONASS（俄罗斯）
- **RTK (Real-Time Kinematic)**：利用载波相位差分，可达 1-2cm 精度，依赖基准站和开阔天空
- **失败模式**：城市峡谷、隧道、室内、多路径效应、jamming/spoofing

### 2.3 IMU（惯性测量单元）

- **测量量**：三轴加速度（accelerometer）+ 三轴角速度（gyroscope）
- **原理**：通过 dead reckoning 从已知起点推算位置和姿态
- **优点**：高频 (100-1000Hz)、独立工作（任何环境均可）、低延迟
- **致命弱点**：积分漂移 — 偏置和噪声随时间积累导致无界位置误差
- **等级**：
  - 消费级 (~\\$10)：秒级漂移
  - 战术/工业级 (\\$1k-\\$10k)：较慢漂移
  - 航空级 (\\$100k+)：极小漂移

### 2.4 GNSS + IMU 融合：Kalman Filter

**为什么需要融合**：
- GNSS：长期绝对约束、低频、信号可能丢失
- IMU：短期连续运动估计、高频、但积分漂移
- 融合互补：GNSS 修正 IMU 漂移，IMU 填补 GNSS 间隙

**Kalman Filter 核心**：
- 递归贝叶斯估计算法，从噪声测量中估计动态系统状态
- 假设：系统线性 + 噪声高斯（可扩展到非线性和非高斯）
- **两步流程**：
  1. **Prediction（预测）**：用 motion model 从上一状态预测当前状态 + 过程噪声
  2. **Update（更新/校正）**：用 measurement model 融合观测 + 测量噪声，修正预测
- **关键矩阵**：
  - 状态转移矩阵 F（motion model）
  - 观测矩阵 H（measurement model）
  - 过程噪声协方差 Q
  - 测量噪声协方差 R
  - Kalman Gain K：权衡预测和观测的权重

### 2.5 相机投影与坐标变换

**四大坐标系**：
- **World Frame**（全局）：全局定位和路径规划
- **Vehicle/Body Frame**（车体）：实时运动控制和近场障碍物检测
- **Sensor/Camera Frame**（传感器）：每个传感器独立坐标系
- **Image Frame**（图像）：2D 像素平面

**齐次坐标 (Homogeneous Coordinates)**：
- 2D 点：\`(x, y)\` → 齐次 \`(x, y, 1)\`
- 3D 点：\`(X, Y, Z)\` → 齐次 \`(X, Y, Z, 1)\`
- 从齐次转回：除以最后一个分量（\`w\`）

**透视投影 (Perspective Projection)**：
- 将 3D 相机坐标映射到 2D 图像平面：
  - \`x = f * X / Z\`
  - \`y = f * Y / Z\`
- 考虑主点偏移 (principal point offset)：
  - \`u = f_x * X/Z + c_x\`
  - \`v = f_y * Y/Z + c_y\`
- 齐次形式：\`[u, v, 1]^T = K * [X, Y, Z]^T / Z\`
  - K = 内参矩阵 = \`[[f_x, 0, c_x], [0, f_y, c_y], [0, 0, 1]]\`

**外参 (Extrinsic)**：描述传感器坐标系到车体坐标系的变换（旋转 R + 平移 t）

### 2.6 视觉定位方法

| 方法 | 核心思想 | 优点 | 缺点 |
|------|----------|------|------|
| **Feature-based / Indirect** | 提取角点/blob → 描述子 → 匹配 | 对光照变化较鲁棒 | 低纹理/重复纹理环境失败 |
| **Direct Method** | 直接利用像素强度误差 | 可用所有像素信息 | 对光照变化敏感 |
| **Learning-based** | 如 PoseNet（23层 GoogLeNet 变体） | 比特征法更鲁棒 | 需要训练数据 |

**Raw Data vs Features vs Landmarks**：
- **Raw Data**：保留所有信息，计算量大，对噪声敏感
- **Feature**：平衡效率与鲁棒性，减少数据量，但低纹理环境失败
- **Landmark**：最高抽象级别，精确绝对定位，但需要预先建图

### 2.7 SLAM（Simultaneous Localization and Mapping）

- 实时估计位姿 + 同步构建环境地图 — "鸡和蛋"问题
- 突破依赖预存高精地图的限制

**四大核心模块**：
1. **Front-End**（前端感知与里程计）：多传感器数据采集和初步处理
2. **Back-End**（后端优化）：处理累积误差和传感器噪声的联合优化
3. **Loop Closure Detection**（闭环检测）：识别车辆是否回到之前经过的区域
4. **Map Construction**（地图构建更新）：生成含几何信息、车道属性、交通灯状态、临时障碍物等的语义地图

### 2.8 LiDAR Localization：ICP vs NDT

| 方法 | 原理 | 优点 | 缺点 |
|------|------|------|------|
| **ICP** (Iterative Closest Point) | 点到点/点到面匹配，迭代最小化距离 | 简单直观 | 依赖初始位姿、大点云慢 |
| **NDT** (Normal Distributions Transform) | 将点云转为概率分布（高斯混合），匹配分布 | 对噪声更鲁棒、大规模场景更快 | 需要足够点来估计分布 |

## 3. Perception 感知

### 3.1 感知任务全景

| 任务 | 描述 | 输出 |
|------|------|------|
| **Object Detection** | 检测车辆、行人、骑行者等 | 3D/2D bounding boxes + 类别 + 置信度 |
| **Panoptic Segmentation** | 语义分割 + 实例分割 | 每个像素的类别和实例 ID |
| **Occupancy / Scene Completion** | 估计空间是否可占用 | 3D/BEV 占用概率网格 |
| **Lane Detection** | 检测车道线和道路边界 | 参数化曲线或分割图 |
| **Drivable Space Estimation** | 判断车辆可行驶区域 | 可行驶区域 mask |
| **Object Tracking** | 跨帧关联目标并估计状态 | track ID + 运动状态 |

### 3.2 LiDAR 点云表示方法

| 表示 | 核心思想 | 优点 | 缺点 |
|------|----------|------|------|
| **3D Voxel** | 空间离散化为 3D 网格 | 保留 3D 几何，3D conv 有效 | 计算和内存立方增长 O(n³) |
| **BEV** (Bird's Eye View) | 俯视图投影，高度特征压缩 | 保留平面几何，2D conv 高效 | 仍有平方级开销 O(n²) |
| **Range View** | 按 LiDAR FOV 投影成 range image | 接近原始传感器结构、高效 | 深度突变处邻域关系可能误导 |
| **Point-based** | 直接处理无序点集 (PointNet++) | 利用稀疏性、精确定位 | 邻域建模复杂、不规则内存访问 |
| **Multi-view Fusion** | 融合多种表示互补 | 保留全部信息、精度更高 | 系统复杂、额外计算成本 |

**稀疏卷积 (Sparse Convolution)**：
- LiDAR 点云非常稀疏（大部分 voxel 为空）
- Submanifold Sparse Convolutional Network：只在非空 voxel 计算
- 稀疏模式不变，可存储为 look-up table
- 加速效果取决于输入密度

### 3.3 Camera-based 3D Perception — "Lift to 3D" <span class="tag">高频考点</span>

**问题**：2D 图像缺少深度信息，如何获得 3D 感知？

| 方法 | 核心思想 | 代表论文 | 优点 | 缺点 |
|------|----------|----------|------|------|
| **Output-level Lifting** | 先做 2D detection，再回归 3D box | Mono3D (CVPR 2016), Deep MANTA (CVPR 2017) | 复用成熟 2D detector，设计简单 | 2D→3D 信息不足，深度不确定，性能不佳 |
| **Input-level Lifting** | Dense depth prediction → pseudo-LiDAR → 点云检测器 | Pseudo-LiDAR (CVPR 2019), Pseudo-LiDAR++ (ICLR 2020) | 性能好，桥接图像和点云 | 额外深度模型增加计算，深度误差传播 |
| **Feature-level Lifting** | 2D feature map 按 camera extrinsics/intrinsics 投影到 3D/BEV | LSS (ECCV 2020), BEVFormer (ECCV 2022) | 端到端，适合 BEV perception | 依赖标定和投影建模 |

- **LSS (Lift, Splat, Shoot)**：2D pixel → 3D frustum（基于深度分布估计）
- **BEVFormer**：用 deformable attention 将 2D features 投影到 BEV queries

### 3.4 Camera-LiDAR 融合策略

| 融合方式 | 描述 | 优点 | 缺点 |
|----------|------|------|------|
| **Cascading** | 2D 检测 + 3D 定位 | 利用成熟 2D 检测器 | 2D 漏检无法被 LiDAR 恢复 |
| **Parallel Output-level** | 各自 3D 检测后融合 | 模块化、快速原型、运行快 | 每个检测只来自单一模态，启发式融合易出错 |
| **Parallel Input-level** | LiDAR 点投影到图像平面，增强点特征 | 数据级融合允许更深处理 | 对标定误差敏感 |
| **Parallel Feature-level** | Camera BEV + LiDAR BEV → concat | 多分辨率融合、对标定小误差鲁棒 | 计算和内存开销更大 |

### 3.5 检测框架

- **One-stage**：直接在输入上回归 bounding box（快但精度可能略低）
- **Two-stage**：proposal + refinement（精度更高但更慢）

**训练中的正负样本分配**：
- **Assignment（正样本匹配）**：GT box 分配给负责的 pixels/voxels，其余为负样本（忽略正样本周围的 ambiguous 区域）
- **Matching（匹配）**：定义检测与 GT 之间的关联代价，常用 greedy 或 Hungarian 算法，适合 refinement 阶段

### 3.6 HD Map 的作用

- 提供先验信息：车道线、道路边界、停止线、转弯限制、交通灯位置
- **Ground height subtraction**：\`(x', y', z') = (x, y, z - g(x,y))\`
  - 平面拟合：RANSAC 拟合地平面
  - 非参数：FCN 在 BEV voxels 中预测

### 3.7 Lane Marking Detection 车道线检测

**传统流程**：
1. **Preprocess**：去噪（Gaussian Blur）、合并颜色通道
2. **Feature Extraction**：边缘检测（卷积算子如 k=[-1,0,1]）、ROI masking（只关注图像下半部分，去掉天空和建筑）
3. **Line Detection**：Hough Transform 将边缘像素转为参数化曲线
4. **Output**：多项式/贝塞尔曲线/样条表示的 lane model

**ROI masking 的目的**（short-answer 考点）：
- 限制搜索区域到图像下半部分
- 去掉天空、建筑等无关像素
- 降低噪声和计算量
- 提高车道线检测准确率

**Deep Learning 方法**：
- 标准语义分割无法区分不同 lane 实例
- 解决方案：predict per-pixel feature embeddings → cluster in feature space

### 3.8 Road/Drivable Space Representations

| 表示 | 描述 | 特点 |
|------|------|------|
| **Road Segmentation** | 每像素分类 road/non-road | 纯语义，"哪里可以开"，不考虑 reachability |
| **Freespace Estimation** | 估计无碰撞可达区域 | 纯几何，不需要外观线索 |
| **Driving Corridor** | 前方应行驶的走廊区域 | 考虑高层规划意图 |
| **Lane Marking Detection** | 检测车道线/路沿 | 高速公路有效，城市可能不可靠 |
| **Lane Detection** | 将两条 lane marking 组成一条车道 | 提供车道宽度和中心线 |

**Drivable Space from Camera**（Tutorial 7 重点）：
1. 估计每个像素的 (x, y, z) 坐标：\`z=depth\`, \`x=(u-c_u)*z/f\`, \`y=(v-c_v)*z/f\`
2. 从语义分割提取道路像素（class index = 7）
3. 用 **RANSAC** 估计地平面：随机选点→拟合平面→计 inliers→保留最多 inliers 的平面→用所有 inliers 重估
4. 计算 drivable space mask：距离平面 < 阈值的像素

### 3.9 Object Tracking 目标跟踪

**目标**：将连续帧的 detections 关联成 tracks

**跟踪流程**：
1. 用 motion model 预测旧 track 新位置
2. 计算 detection 与 track 的 association cost
3. 全局数据关联（Hungarian algorithm 做二分图匹配）
4. 用 Kalman Filter 更新 track 状态
5. 管理 track 生命周期：
   - Matched：confidence ↑
   - Unmatched tracks：confidence ↓ → 可能消亡
   - Unmatched detections：可能新生为 track

**Association Metrics 关联指标**：
- IoU（交并比）：仅空间，无外观
- Color histograms / cross-correlation：外观匹配
- Optical flow agreement：运动一致性
- Bounding box relative location/size
- Object orientation
- Learned representation（embedding）：Triplet loss 训练 → \`||f(a)-f(p)||₂ < ||f(a)-f(n)||₂ + α\`

### 3.10 Hungarian Algorithm（匈牙利算法）

解决加权二分图匹配问题，找到全局最优分配。

**步骤**：
1. **Row Reduction**：每行减去该行最小值 → 每行至少有一个 0
2. **Column Reduction**：每列减去该列最小值 → 每列至少有一个 0
3. **Minimum Line Coverage**：用最少的线覆盖所有 0
4. **Adjust Matrix**：如果线数 < 矩阵维度，找出未覆盖最小值，未覆盖元素减去该值，交叉元素加上该值
5. 重复 3-4 直到找到 optimal assignment（n 个独立 0）

**应用**：Track-Detection 关联，最小化总关联代价

## 4. Prediction 预测

### 4.1 预测问题的五大挑战

1. **Partial Observation**：遮挡、传感器视野限制 → 只能感知环境子集
2. **Unknown Intentions**：驾驶员目标不可直接观测 → 必须从稀疏观测推断
3. **Interactions**：交通参与者互相影响 → 不能独立预测每个 agent
4. **Multi-modality**：未来有多种合理轨迹 → 需要预测完整分布
5. **Uncertainty**：不仅要给轨迹，还要表达置信度

### 4.2 三类预测方法

| 方法 | 输入 | 代表技术 | 优点 | 缺点 |
|------|------|----------|------|------|
| **Kinematic** | 当前状态 | CV（匀速）、CTRA（恒转率和加速度） | 简单快速、有物理先验 | 无法覆盖复杂行为和安全关键场景 |
| **Track-based Data-driven** | past trajectories + HD map | RNN/Transformer/GNN | 从数据学习复杂模式 | 计算成本高、tracking noise、信息瓶颈、低可解释性 |
| **Joint PnP** (Perception and Prediction) | raw sensor data + scene representation | LiDAR sweeps + map | 共享计算、可传播不确定性、减少 tracking bottleneck | 系统复杂 |

**Track-based 为什么不能很好传播不确定性？**
- 维度灾难：信息太多无法维护
- 信息瓶颈：无法保留不确定性来源
- 时间相关性丢失：不确定性在时间上高度相关但 tracking 丢失了这种相关性

### 4.3 Scene Representation 场景表示

| 表示 | 描述 | 优点 | 缺点 |
|------|------|------|------|
| **Raster BEV** | 将地图和 agent 轨迹编码为 BEV 图像 | 实现简单、适合 CNN | 内存密集、分辨率有限、感受野受限 |
| **Vector/Trajectory** | Lane/agent 用 polyline/waypoint 表示 | 紧凑、表现力好 | past trajectory 信息有限 |
| **LiDAR Sweeps** | 多帧点云在 ego 坐标系 voxelized → BEV | 保留原始传感器丰富信息 | 计算量大 |

**编码方式**：
- **Past trajectory encoder**：RNN（序贯好）或 Transformer（长程依赖好）
- **Agent feature from LiDAR**：轻量检测器找 candidate → crop BEV feature patch → CNN 提取特征

### 4.4 Interaction Encoding 交互建模

**为什么要建模交互？**
- 真实驾驶是 social 活动：agent 之间相互跟随、让行、避让、反应
- 安全逼真的预测必须理解"谁在和谁交互以及如何交互"

**方法**：
- 将场景表示为 **异构图 (Heterogeneous Graph)**：
  - Nodes = agents + lane-graph nodes + traffic light states
  - Edges = 空间邻近性、车道连接性等关系
- 用 **GNN** 进行 "social reasoning"：
  - **Edge MLP**：计算节点间传递的 "message"
  - **Max Pooling**：聚合多个 message（逐元素最大值）
  - **GRU Update**：结合旧状态和新聚合消息生成更新节点状态

**Actor-to-Actor**：车辆之间相互影响
**Actor-to-Map**：车辆与车道、交通规则、路口关系

### 4.5 Agent-centric vs Scene-centric vs Hybrid

| 编码方式 | 描述 | 优点 | 缺点 |
|----------|------|------|------|
| **Agent-centric** | 以每个 agent 为中心 | 视角不变、样本高效 | 推理慢（每个 agent 都要过一遍） |
| **Scene-centric** | 以 ego 为共享参考系 | 推理快 | 视角依赖、样本低效 |
| **Hybrid** (Pair-wise Relative Geometric Encoding) | 节点特征在各自 frame，边特征编码发送者到接收者坐标系的变换 | 快、视角不变、样本高效 | 设计复杂 |

### 4.6 Multi-modal Prediction 多模态预测

**表示方法**：
1. **Trajectory Set**：从训练数据中构建真实轨迹数据库，保证动力学可行（但覆盖有限）
2. **Goal-based**：用目标终点集合捕捉未来模态，可显示地图相对参数化（可能不覆盖非合规行为）
3. **Auto-regressive**：逐时间步采样条件分布 → 多步采样产生多样化未来（但序贯采样慢、误差累积）
4. **Mixture of Gaussians**：K 个模态概率 + K 条轨迹回归（但概率训练可能导致模态坍缩）
5. **Scene-consistent / Joint Prediction**：建模场景级别的联合未来，而非独立预测每个 agent

**关键概念**：训练数据中只有一条观测轨迹，但模型需要学会预测完整分布（多条可能的未来）

## 5. Planning 规划

### 5.1 三层规划体系

| 层级 | 名称 | 输入 | 输出 | 算法 |
|------|------|------|------|------|
| **Strategic** | Route Planning / Mission Planning | 起点、终点、road network | 道路级路线（经过哪些路段） | Dijkstra, A* |
| **Tactical** | Behavior Planning | ego 状态、环境、交通规则 | 驾驶行为决策（stop/yield/lane change/overtake） | FSM, MDP |
| **Execution** | Motion Planning | behavior 规范 + 环境 + 动力学 | 可执行轨迹（position + velocity + time） | 优化、采样、图搜索 |

### 5.2 Route Planning：Dijkstra vs A*

**Road Network as Directed Graph**：
- Node = 交叉口/路段连接点
- Edge = 道路段（有向）
- Weight = 距离 / 时间 / 代价

**Dijkstra 算法**：
- 贪心算法，非负权重图上从单源到所有节点的最短路径
- \`f(n) = g(n)\`：只考虑从起点到当前节点的实际代价
- 维护 priority queue，每次扩展当前最小 cost 节点
- 向各方向均匀扩展（无方向性）
- 时间复杂度：基本 O(V²)，优化 O((V+E)log V)

**A\\* 算法**：
- \`f(n) = g(n) + h(n)\`：实际代价 + 启发式估计
- \`h(n)\` 启发式：从当前节点到目标的估计距离
- 如果 \`h(n)\` 是 **admissible**（不高估真实距离）且 **consistent**（满足三角不等式），保证最优解
- Euclidean distance 是常用的 admissible + consistent 启发式
- 向着目标方向有引导性地扩展 → 显著减少探索节点数

**Dijkstra vs A\\* 对比**：
| 对比项 | Dijkstra | A* |
|--------|----------|-----|
| 评价函数 | f(n) = g(n) | f(n) = g(n) + h(n) |
| 启发式 | 无 | 有（如 Euclidean distance） |
| 扩展方向 | 各方向均匀 | 偏向目标方向 |
| 最优性 | 保证（非负权重） | 保证（h(n) admissible + consistent） |
| 探索节点数 | 更多 | 更少（效率更高） |

### 5.3 Apollo Trajectory Planning 架构

Apollo 将 trajectory planning 分为两步：

\`\`\`
Path Decision → Path Optimize → Speed Decision → Speed Optimize
\`\`\`

- **Path Planning**：处理空间维度 — 静态环境、车道、低速障碍物
- **Velocity Planning**：处理时间维度 — 动态障碍物

### 5.4 Apollo Path Planning 模块

| 模块 | 功能 | 关键决策 |
|------|------|----------|
| \`LANE_CHANGE_DECIDER\` | 是否换道 | 基于当前车道状态和目标方向 |
| \`PATH_REUSE_DECIDER\` | 是否复用之前规划的路径 | 如果环境未变化可复用节省计算 |
| \`PATH_LANE_BORROW_DECIDER\` | 是否借道绕行（借用对向车道） | 条件：单车道 + 前方障碍 + 障碍离路口远 + 障碍静止 + 虚线允许 |
| \`PATH_BOUNDS_DECIDER\` | 生成可行驶边界 | regular/self（本车道）、regular/left（左借道）、regular/lanechange（换道） |
| \`PIECEWISE_JERK_PATH_OPTIMIZER\` | 在边界内优化路径，控制 jerk | 分段 jerk 优化保证舒适性 |
| \`PATH_ASSESSMENT_DECIDER\` | 评估不同规划路径质量 | 碰撞风险、路径长度、是否停在超车道等 |
| \`PATH_DECIDER\` | 基于选择的 lane 做最终决策 | stop or yield |

### 5.5 Apollo Velocity Planning

**Frenet Reference Frame**：
- s：沿参考线的纵向距离
- d：垂直于参考线的横向偏移

**ST Graph**（核心概念）：
- s 轴：沿参考线的纵向距离
- t 轴：时间
- 障碍物在 ST 图中形成 **collision boundary**
- 自车轨迹不能穿过 collision boundary

**经典运动学场景**：
1. 匀速沿车道中心线行驶
2. 前车匀速 → 自车跟随（保持安全距离）
3. 前车突然停车 → 自车减速停车
4. 前车匀速后停车 → 自车先跟随后停车

**Velocity Planning 模块**：
- \`SPEED_BOUNDS_PRIORI_DECIDER\`：设置 v_max, v_min 先验边界
- \`SPEED_HEURISTIC_OPTIMIZER\`：启发式速度优化
- \`SPEED_DECIDER\`：速度决策
- \`SPEED_BOUNDS_FINAL_DECIDER\`：最终速度边界（考虑 speed bump, speed limit, pedestrian proximity）
- \`PIECEWISE_JERK_NONLINEAR_SPEED_OPTIMIZER\`：非线性 jerk 优化

### 5.6 Behavior Planning

- **Finite State Machine (FSM)**：状态（lane keeping, lane change, stop, yield...）+ 基于感知的转移规则
- **Markov Decision Process (MDP)**：概率建模，考虑不确定性

### 5.7 Learning-based Planning

| 方法 | 描述 | 优点 | 缺点 |
|------|------|------|------|
| **Direct Action Output** | 端到端输出 steering/acceleration | 简单 | 可解释性差、难以保证安全 |
| **Affordance Prediction** | 预测中间驾驶相关变量再规划控制 | 可解释、模块化、便于加规则 | 需要设计中间表示，可能引入信息瓶颈 |
| **Open-loop Learning** | 只用 expert 数据训练，policy 动作不影响状态 | 训练简单 | distribution shift（训练和推理分布不同） |
| **Closed-loop Learning** | Policy 在交互环境中执行，根据反馈学习 | 减少 train/inference 分布差异 | 训练成本高、安全风险 |
| **DAgger** | 在 policy 访问的新状态上请求 expert labeling | 缓解 distribution shift | 需要 expert 在线 |
| **Reinforcement Learning** | 通过 reward 设计学习策略 | 可自主学习 | 样本效率低、安全风险、reward design 难、sim-to-real gap |

**Affordance vs Direct Control Output**（short-answer 考点）：
- **Affordance 优点**：更可解释、便于加入规则约束、利于模块间调试和验证
- **Affordance 缺点**：需要设计中间表示、可能引入信息瓶颈或误差传播
- **Direct 优点**：端到端简单、减少人工设计
- **Direct 缺点**：黑盒、难以安全验证

## 6. Control 控制

### 6.1 控制目标和评价指标

**目标**：将 motion planner 的 reference trajectory 转换为 steering / throttle / brake 命令

**评价指标**：
- Lateral error（横向误差）
- Longitudinal / Speed error（纵向/速度误差）
- Yaw / Heading error（航向误差）
- Comfort（加速度、jerk）

### 6.2 Open-loop vs Closed-loop Control

| 类型 | 特点 | 缺点 |
|------|------|------|
| **Open-loop** | 不利用反馈，依赖精确模型 | 无法处理未知扰动、容易 drift |
| **Closed-loop** | 根据 reference 与 measurement 的 error 修正控制 | 更鲁棒，是自动驾驶控制核心 |

### 6.3 PID Control

**数学公式**（连续时间）：
\`u(t) = K_p * e(t) + K_i * ∫e(t)dt + K_d * de(t)/dt\`

**三项作用**：
| 项 | 作用 | 优点 | 风险 |
|----|------|------|------|
| **P** (Proportional) | 响应当前误差 | 响应快 | 单独使用导致 overshoot/oscillation |
| **I** (Integral) | 消除历史累积误差 | 消除 steady-state error | 可能引起 integral windup |
| **D** (Derivative) | 预测误差变化趋势 | 引入 damping，减少 overshoot 和 oscillation | 对噪声敏感 |

**Ziegler-Nichols**：常用 PID 参数整定启发式方法

**PID 例题类型**（必会计算）：
- 离散 PID：\`u(k) = K_p*e(k) + K_i*Σe(i) + K_d*(e(k)-e(k-1))\`
- 给定 v_target 和 v_actual 序列，计算各时刻的 u(k)
- 注意积分项是累加历史误差

**考试例题回顾**：
- P-only：\`u(0) = K_p * (v_target - v_actual)\`
- PI：\`u(1) = K_p*e(1) + K_i*(e(0)+e(1))\`
- PID 全项：注意 D 项用 \`e(k) - e(k-1)\`，且考虑 actuator saturation（100% 上限）

### 6.4 Pure Pursuit Control

- 模拟人类驾驶逻辑：向前看目标点，调整转向角接近目标
- **核心参数**：look-ahead distance（前视距离）
  - 长 → 更稳定但响应慢
  - 短 → 响应快但可能不稳定
- 关注未来路径趋势，避免频繁转向，提高跟踪平滑性
- **四步流程**：预定义参考路径 → 确定目标点（固定前视距离处） → 几何关系计算转向角 → 实时更新

### 6.5 Stanley Controller

- DARPA Challenge 中 Stanley（Stanford 车队）使用的控制律
- **同时考虑** heading error 和 cross-track error
- **可修正**较大的横向误差和航向误差
- 全局稳定性已证明：独立于初始条件引导车辆回归
- 但不考虑噪声观测、执行器动力学、轮胎力效应
- **可添加**软化/阻尼项和曲率信息

### 6.6 LQR (Linear Quadratic Regulator)

- 线性系统的**最优控制器**
- 系统形式：\`ẋ = Ax + Bu\`（连续）或 \`x_{k+1} = A x_k + B u_k\`（离散）
- **代价函数**：\`J = ∫(x^T Q x + u^T R u)dt\`
  - **Q**（state cost 矩阵）：惩罚偏离目标状态的程度 → Q 越大越 aggressive
  - **R**（control cost 矩阵）：惩罚控制量的使用 → R 越大越保守平滑
- **最优控制**是 linear feedback：\`u = -Kx\`，K 通过求解 **Algebraic Riccati Equation (ARE)** 获得
- Apollo 中 2-DOF 横向误差模型通常包含：
  - lateral error, lateral error rate, heading error, heading error rate

**LQR + Feedforward Compensation**：
- LQR 根据实时误差反馈（只对当前误差大小反应）
- Feedforward 根据曲率和车速预先给出 baseline steering
- 最终输出 = LQR feedback + Feedforward

**LQR vs PID**（常考）：
- LQR：基于系统模型，优化二次型代价函数 → 保证线性系统最优
- PID：不需要精确模型，工业常用，调参直观 → 但难处理多变量和约束

### 6.7 MPC (Model Predictive Control)

- 每个时间步求解**有限时域优化问题**
- **Receding Horizon Principle**：只应用第一个控制动作，其余舍弃，下一步重新求解
- **代价函数**（离散）：\`J = Σ(x_k^T Q x_k + u_k^T R u_k) + x_N^T P_0 x_N\`
  - P_0：终端惩罚矩阵（保证稳定性，常来自 LQR 的 ARE 解）
- **关键优势**：可显式处理 **constraints**（状态边界、输入边界、安全限制）
- 求解是 **Quadratic Programming (QP)** 问题（线性系统）或 Nonlinear Programming（非线性系统）

**MPC vs LQR vs PID**：
| 控制器 | 模型需求 | 约束处理 | 计算成本 | 适用场景 |
|--------|----------|----------|----------|----------|
| **PID** | 无 | 无 | 极低 | 简单 SISO 系统 |
| **LQR** | 需要线性模型 | 无（indirect） | 低（离线求解 ARE） | 线性系统最优控制 |
| **MPC** | 需要模型（线性或非线性） | **显式处理** | 高（每步在线 QP） | 多变量 + 约束系统 |

**MPC 缺点**（常考）：
- 在线优化计算成本高（每步求解 QP/NLP）
- 稳定性不自动保证（需要 terminal cost/set 设计）
- 调参更多：N, Q, R, P, constraints
- 性能依赖模型质量

### 6.8 Actuators 执行器

- 需要标定执行器以了解系统能力和边界
- 重要限制：最大加速度 vs 速度、最大减速度、转向角 ↔ yaw rate 关系、最大转向速率、各执行器最大/最小 jerk

## 7. End-to-End (E2E) Autonomous Driving

### 7.1 Traditional vs End-to-End

| 维度 | Traditional（模块化） | End-to-End |
|------|---------------------|------------|
| **架构** | 清晰模块划分 | 从 sensor 直接到 driving/planning |
| **可解释性** | 高（每个模块可独立分析） | 低（黑盒） |
| **调试** | 容易定位问题模块 | 难以定位失败原因 |
| **误差传播** | 跨模块累积、接口信息损失 | 联合优化、减少接口损失 |
| **安全验证** | 模块级可独立验证 | 全系统验证困难 |
| **数据需求** | 各模块独立数据 | 需要大量端到端驾驶数据 |
| **泛化** | 各模块相对可控 | 泛化到新场景挑战大 |

### 7.2 UniAD (CVPR 2023 Best Paper)

**核心思想**：Planning-oriented — 将 perception、prediction、planning 统一到一个端到端框架中

**组件及参数量**：
| 组件 | 参数量 | 占比 | 功能 |
|------|--------|------|------|
| Backbone + BEV Encoder | 77-82M | ~62-65% | 图像特征提取 + BEV 特征构建 |
| TrackFormer | 8-10M | ~7% | Agent 检测和跟踪 |
| MapFormer | 8-10M | ~7% | HD Map 元素分割 |
| MotionFormer | 10-12M | ~9% | 多 agent 未来轨迹预测 |
| OccFormer | 6-8M | ~5% | Dense BEV 占用预测 |
| Planner | 2-3M | ~2% | Ego 车辆轨迹规划 |
| **Total** | **125M** | **100%** | |

**关键技术**：
- **BEVFormer**：时空 BEV 特征提取（可替换为其他 BEV encoder）
- **Query/Attention 建模**：agent-agent, agent-map, agent-goal point 关系
- **SDC Query**：在 TrackFormer 和 MotionFormer 中一致建模自车
- **Collision Optimization**：引导预测轨迹避开占用区域
- **Non-linear Optimization**：根据上游预测调整 ground-truth 轨迹

### 7.3 VLM-powered E2E（视觉语言模型驱动的端到端）

**两类方法**：
1. **Driving with VLM**（直接驾驶）：
   - DriveMLM (Dec 2023), LMDrive (CVPR'24), DriveGPT4 (RA-L'24)
   - DriveVLM (CoRL'24), OmniDrive (NVIDIA 2024), EMMA (Waymo 2024)
   - OpenEMMA (WACV'25), ORION (Mar 2025)

2. **VLM-assisted Planning**（Fast-Slow 双系统）：
   - Fast system：实时规划（高频、安全关键）
   - Slow system：VLM 语义推理（低频、复杂场景理解）

**优势**：语义推理、开放词汇理解、可解释性
**风险**：实时性、可靠性、幻觉 (hallucination)、安全验证

## 8. Apollo / Cyber 框架详解

### 8.1 Cyber RT 概述

- Apollo 的高性能实时运行框架，**替代 ROS**
- 关键特性：高性能低延迟、确定性执行、模块化数据驱动、支持异构硬件

### 8.2 三种通信方式

| 通信方式 | 模型 | 特点 | 使用场景 |
|----------|------|------|----------|
| **Writer/Reader** | Publish-Subscribe，共享内存 | 高性能低延迟、单向 | 传感器数据流、控制命令 |
| **Service/Client** | 请求-响应，基于 RTPS 协议 | 双向通信 | 跨机通信、需要返回结果的请求 |
| **Parameter Services** | 封装 Service/Client | 全局配置参数共享 | 多进程模块共享配置 |

**Protobuf**：
- 跨语言、跨平台的数据序列化协议
- 序列化后体积比 XML 小 3-10 倍，速度快 20-100 倍
- 双方使用同一数据协议，单方修改不影响对方
- 支持 Java, C++, Python, Go 等

### 8.3 Cyber Component

**核心概念**：
| 概念 | 描述 |
|------|------|
| **Node** | 功能和计算的基本单位，所有功能代码在 Node 中执行，独立开发/编译/部署/启停 |
| **Channel** | 异步消息通信通道，有唯一名称和严格数据类型 |
| **Writer** | 发布消息到指定 Channel |
| **Reader** | 从指定 Channel 读取消息 |
| **DAG** (Directed Acyclic Graph) | 描述系统拓扑：Nodes、Channels、数据流、依赖关系 |

**两种 Component 类型**：
| 类型 | 触发方式 | 特点 |
|------|----------|------|
| **Data-driven Component** | 所需数据到齐后触发 | 支持 1-4 个 Channel 数据融合，第一个 Channel 为主 Channel |
| **TimerComponent** | 按固定时间间隔触发 | 最小精度 2ms，时间轮驱动，不支持数据融合 |

**Component 创建步骤**：
1. Include Component 头文件
2. 选择 Component 类型
3. 定义类继承 Component，重写 \`Init()\` 和 \`Proc()\`
4. 在 Cyber 中注册

**优势**：模块化架构与进程隔离、配置无需重编译（DAG 文件定义拓扑）、灵活通信与融合策略、运行时动态加载

### 8.4 Cyber Scheduling

| 调度算法 | 描述 | 优点 | 缺点 |
|----------|------|------|------|
| **FCFS** (First Come First Served) | 按到达顺序执行 | 简单公平 | 平均等待时间长 |
| **SJF** (Shortest Job First) | 最短执行时间的任务优先 | 平均等待时间最低 | 长任务可能饥饿 (starvation) |
| **Round Robin** | 每个任务获得固定时间片，轮转执行 | 避免饥饿，公平 | 时间片选择关键 |

### 8.5 Cyber Plugin

- 运行时加载的共享库，扩展系统功能
- **关键特性**：
  - Interface-based Design（基于标准 Cyber 接口）
  - Dynamic Discovery（框架自动识别和注册）
  - Isolated Functionality（自包含单元）
- **插件类型**：Component Plugins（新算法）、Communication Adapters（新协议）、Data Codec Plugins（序列化格式）、Tool & Utility Plugins（调试监控）
- **核心优势**：
  - Hot-swapping：不重启系统替换算法
  - A/B Testing：方便比较不同算法实现
  - Zero-Downtime Updates：更新单个插件不停机
  - 第三方集成和社区贡献

### 8.6 Apollo Perception Pipeline

**LiDAR 感知流程**：
| 组件 | 功能 |
|------|------|
| \`pointcloud_preprocess\` | 删除离群点、自车点、过远点 |
| \`pointcloud_map_based_roi\` | 过滤 ROI 外的点云 |
| \`pointcloud_ground_detection\` | 过滤地面点 |
| \`lidar_detection_filter\` | 按规则过滤（类别等） |
| \`lidar_tracking\` | 跟踪障碍物运动轨迹，更新运动状态和几何形状，分配 tracking ID |
| \`lidar_cluster\` | 聚类（tutorial 中使用的简化算法） |

**Camera 感知**：交通灯识别，tracking + feature extraction

### 8.7 Apollo Simulator

- 基于 Unity 引擎构建
- **价值**：更安全（无真实事故风险）、更便宜、更快、自动生成 ground truth、可构造 corner cases
- **CARLA**：基于 Unreal Engine 5 的主流开源 ADS 模拟器
- **功能**：场景配置（道路类型/障碍物/驾驶计划/交通灯）、多传感器模拟与自动标注、3D 可视化、模块验证

## 12. 高频对比题模板

### GNSS vs Perception Localization
- **GNSS**：全局绝对、长期稳定、低计算 — 但城市峡谷/隧道失败、更新率低
- **Perception**：局部精确、高频、GNSS-denied 可用 — 但依赖环境特征和地图
- **对控制影响**：定位误差 → lateral/heading/speed tracking error → 规划安全边界 → 控制不稳定

### Dijkstra vs A*
- **Dijkstra**：\`f=g\`，无启发式，各方向均匀扩展，保证最优
- **A\\***：\`f=g+h\`，目标方向引导，更高效探索，h admissible+consistent 保证最优

### PID vs LQR vs MPC
- **PID**：无模型、工业广泛使用、调参直观 — 难处理多变量和约束
- **LQR**：模型驱动、线性系统最优、优化 state/control cost — 需模型、无显式约束
- **MPC**：滚动优化、显式约束处理、适合复杂轨迹 — 计算成本高、需在线求解

### Modular ADS vs End-to-End ADS
- **Modular**：可解释、可验证、易调试 — 接口信息损失、误差传播
- **E2E**：联合优化、减少手工规则 — 数据需求高、安全验证难、可解释性弱

### ICP vs NDT
- **ICP**：点到点/面匹配，简单直观 — 依赖初始位姿、大点云慢
- **NDT**：概率分布匹配 — 对噪声鲁棒、大规模快

### Agent-centric vs Scene-centric Encoding
- **Agent-centric**：视角不变、样本高效 — 推理慢
- **Scene-centric**：推理快 — 视角依赖、样本低效
- **Hybrid**：Pair-wise relative geometric encoding — 兼顾两者优势

### Open-loop vs Closed-loop Learning
- **Open-loop**：只用 expert 数据训练、简单 — distribution shift
- **Closed-loop**：在交互环境中学习 — 减少分布差异、但训练成本高

### Camera vs LiDAR vs Radar
- **Camera**：语义丰富、便宜 — 受光照天气影响、无原生深度
- **LiDAR**：3D 几何精确、不受光照影响 — 成本高、稀疏、天气敏感
- **Radar**：速度测量鲁棒、穿透雨雾 — 分辨率低

## 13. 关键公式速查

### 定位与坐标
- 透视投影：\`u = f*X/Z + c_u\`, \`v = f*Y/Z + c_v\`
- 3D 恢复（from depth）：\`z = depth\`, \`x = (u-c_u)*z/f\`, \`y = (v-c_v)*z/f\`
- 距离：\`d = √(x² + y² + z²)\`

### 规划
- Dijkstra：\`f(n) = g(n)\`
- A\\*：\`f(n) = g(n) + h(n)\`（h 需 admissible + consistent）

### 控制
- PID 连续：\`u(t) = K_p*e(t) + K_i*∫e(t)dt + K_d*de(t)/dt\`
- PID 离散：\`u(k) = K_p*e(k) + K_i*Σe(i) + K_d*(e(k)-e(k-1))\`
- LQR 代价：\`J = ∫(x^T Q x + u^T R u)dt\`
- MPC 代价：\`J = Σ(x_k^T Q x_k + u_k^T R u_k) + x_N^T P_0 x_N\`

### 地平面拟合
- 平面：\`ax + by + cz + d = 0\`
- 点到面距离：\`|ax + by + cz + d| / √(a²+b²+c²)\`

1. **系统全景**：背 ADS pipeline，五大模块的输入/输出/失败场景
2. **Localization**：GNSS/IMU/KF → 相机投影/坐标变换 → SLAM → ICP/NDT
3. **Perception**：LiDAR 表示 → BEV → Lift to 3D（三种方式）→ 车道线检测 → Tracking/Hungarian

5. **Planning**：三层体系 → Dijkstra/A\\* → Apollo path + velocity planning → Learning-based planning
